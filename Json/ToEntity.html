<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DDL 转 C# 实体</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #111317;
      --text: #f5f7fb;
      --muted: #9aa4b2;
      --muted-strong: #c9d1dc;
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(255, 255, 255, 0.24);
      --success: #2dd4bf;
      --danger: #fb7185;
      --warning: #f59e0b;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.44);
      --mono: Consolas, "SFMono-Regular", "Liberation Mono", Menlo, monospace;
      --sans: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 260px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 80px 80px, 80px 80px, auto;
      color: var(--text);
      font-family: var(--sans);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(47, 125, 246, 0.16), transparent 30%, transparent 72%, rgba(45, 212, 191, 0.12)),
        linear-gradient(180deg, transparent, rgba(5, 5, 5, 0.86) 78%);
      z-index: -1;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1480px, calc(100vw - 40px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0 26px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04)),
        #090a0c;
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      flex: 0 0 auto;
    }

    .mark svg {
      width: 25px;
      height: 25px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      min-height: 38px;
      border-radius: 8px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
      white-space: nowrap;
    }

    .button:hover,
    .button:focus-visible {
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
      outline: none;
    }

    .button.primary {
      color: #050505;
      background: #ffffff;
      border-color: #ffffff;
      font-weight: 700;
    }

    .button.primary:hover,
    .button.primary:focus-visible {
      background: #eef3ff;
      border-color: #eef3ff;
    }

    .button.active {
      color: var(--success);
      border-color: rgba(45, 212, 191, 0.48);
      background: rgba(45, 212, 191, 0.12);
    }

    .button svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.2;
      flex: 0 0 auto;
    }

    .toggle {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted-strong);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      user-select: none;
      white-space: nowrap;
    }

    .toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--success);
    }

    .status-strip {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) repeat(3, auto);
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.035)),
        rgba(17, 19, 23, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .status-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(184, 107, 0, 0.12);
      flex: 0 0 auto;
    }

    .status-strip.valid .status-dot {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.14), 0 0 18px rgba(45, 212, 191, 0.58);
    }

    .status-strip.invalid .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.14), 0 0 18px rgba(251, 113, 133, 0.34);
    }

    .status-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric {
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .workspace {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
    }

    .pane {
      min-height: 540px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.035)),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane-head {
      height: 58px;
      padding: 0 14px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
    }

    .pane-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      color: var(--muted-strong);
    }

    .pane-title svg {
      width: 18px;
      height: 18px;
      color: var(--success);
      flex: 0 0 auto;
    }

    .pane-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-strong);
      color: var(--text);
      outline: none;
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
    }

    .editor-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #080b10;
    }

    .editor-shell {
      height: 100%;
      min-height: 480px;
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      background: #080b10;
    }

    .line-gutter {
      margin: 0;
      padding: 18px 10px 18px 0;
      overflow: hidden;
      color: rgba(154, 164, 178, 0.62);
      background: #07090d;
      border-right: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.68;
      text-align: right;
      user-select: none;
      white-space: pre;
    }

    textarea {
      grid-column: 2;
      grid-row: 1;
      width: 100%;
      height: 100%;
      min-height: 480px;
      padding: 18px;
      resize: none;
      outline: none;
      border: 0;
      display: block;
      color: #e9eef8;
      background: #080b10;
      caret-color: var(--success);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.68;
      tab-size: 2;
      letter-spacing: 0;
      overflow: auto;
      white-space: pre;
    }

    textarea::placeholder {
      color: rgba(154, 164, 178, 0.72);
    }

    .output {
      height: 100%;
      min-height: 480px;
      margin: 0;
      padding: 18px;
      overflow: auto;
      color: #dbe7f7;
      background: #080b10;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.68;
      white-space: pre;
      tab-size: 4;
    }

    .placeholder {
      color: rgba(154, 164, 178, 0.72);
    }

    .cs-keyword {
      color: #93c5fd;
      font-weight: 700;
    }

    .cs-type {
      color: #2dd4bf;
    }

    .cs-class-name {
      color: #fbbf24;
    }

    .cs-property {
      color: #e9d5ff;
    }

    .cs-comment {
      color: #94a3b8;
    }

    .cs-tag {
      color: #86efac;
    }

    .error-box {
      margin: 14px;
      padding: 14px 15px;
      border-radius: 8px;
      border: 1px solid rgba(251, 113, 133, 0.32);
      background: rgba(251, 113, 133, 0.1);
      color: #fecdd3;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 980px) {
      .app {
        width: min(100vw - 24px, 760px);
        padding: 14px 0;
      }

      .topbar,
      .status-strip,
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 13px;
        line-height: 1.55;
      }

      .status-strip {
        display: flex;
        align-items: stretch;
        flex-direction: column;
      }

      .status-text {
        white-space: normal;
      }

      .metric {
        width: 100%;
      }

      .pane {
        min-height: 420px;
      }

      .editor-shell,
      textarea,
      .output {
        min-height: 360px;
        font-size: 13px;
      }

      .line-gutter {
        width: 48px;
        font-size: 13px;
      }

      .editor-shell {
        grid-template-columns: 48px minmax(0, 1fr);
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 7h16"></path>
            <path d="M4 12h10"></path>
            <path d="M4 17h7"></path>
            <path d="m17 14 3 3-3 3"></path>
          </svg>
        </div>
        <div>
          <h1>DDL 转 C# 实体</h1>
          <p class="subtitle">粘贴 MySQL 或 SQL Server 建表语句，自动生成 C# 实体类与字段注释。</p>
        </div>
      </div>
      <div class="actions">
        <label class="toggle" title="开启后所有字段类型后追加 ?">
          <input id="nullableToggle" type="checkbox" checked>
          字段可空
        </label>
        <button class="button" id="sampleBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
            <path d="M10 9H8"></path>
            <path d="M16 13H8"></path>
            <path d="M16 17H8"></path>
          </svg>
          示例
        </button>
        <button class="button primary" id="copyBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect width="14" height="14" x="8" y="8" rx="2"></rect>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
          </svg>
          复制结果
        </button>
      </div>
    </header>

    <section class="status-strip" id="statusStrip" aria-live="polite">
      <div class="status-main">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text" id="statusText">等待输入 DDL</span>
      </div>
      <div class="metric" id="dbMetric">数据库：--</div>
      <div class="metric" id="tableMetric">表：0</div>
      <div class="metric" id="columnMetric">字段：0</div>
    </section>

    <section class="workspace">
      <article class="pane">
        <div class="pane-head">
          <div class="pane-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
            </svg>
            <span>DDL 输入</span>
          </div>
          <div class="pane-tools">
            <button class="icon-button" id="pasteBtn" type="button" title="粘贴">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M8 4v3a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V4"></path>
                <rect width="8" height="4" x="8" y="2" rx="1"></rect>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
              </svg>
            </button>
            <button class="icon-button" id="clearBtn" type="button" title="清空">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 6h18"></path>
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="editor-wrap">
          <div class="editor-shell">
            <pre class="line-gutter" id="inputLines" aria-hidden="true">1</pre>
            <textarea id="input" spellcheck="false" wrap="off"
              placeholder="粘贴 MySQL 或 SQL Server 建表语句..."></textarea>
          </div>
        </div>
      </article>

      <article class="pane">
        <div class="pane-head">
          <div class="pane-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M8 4H6a2 2 0 0 0-2 2v3a3 3 0 0 1-2 3 3 3 0 0 1 2 3v3a2 2 0 0 0 2 2h2"></path>
              <path d="M16 4h2a2 2 0 0 1 2 2v3a3 3 0 0 0 2 3 3 3 0 0 0-2 3v3a2 2 0 0 1-2 2h-2"></path>
            </svg>
            <span>C# 实体</span>
          </div>
          <div class="pane-tools">
            <button class="icon-button" id="copyOutputBtn" type="button" title="复制结果">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect width="14" height="14" x="8" y="8" rx="2"></rect>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
              </svg>
            </button>
            <button class="icon-button" id="downloadBtn" type="button" title="下载 CS">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 15V3"></path>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="m7 10 5 5 5-5"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="editor-wrap">
          <pre class="output placeholder" id="output">生成的 C# 实体类会显示在这里。</pre>
          <div class="error-box hidden" id="errorBox"></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const input = document.querySelector("#input");
    const inputLines = document.querySelector("#inputLines");
    const output = document.querySelector("#output");
    const errorBox = document.querySelector("#errorBox");
    const statusStrip = document.querySelector("#statusStrip");
    const statusText = document.querySelector("#statusText");
    const dbMetric = document.querySelector("#dbMetric");
    const tableMetric = document.querySelector("#tableMetric");
    const columnMetric = document.querySelector("#columnMetric");
    const nullableToggle = document.querySelector("#nullableToggle");
    const sampleBtn = document.querySelector("#sampleBtn");
    const clearBtn = document.querySelector("#clearBtn");
    const pasteBtn = document.querySelector("#pasteBtn");
    const copyBtn = document.querySelector("#copyBtn");
    const copyOutputBtn = document.querySelector("#copyOutputBtn");
    const downloadBtn = document.querySelector("#downloadBtn");

    const csharpKeywords = new Set([
      "abstract", "as", "base", "bool", "break", "byte", "case", "catch", "char", "checked",
      "class", "const", "continue", "decimal", "default", "delegate", "do", "double", "else",
      "enum", "event", "explicit", "extern", "false", "finally", "fixed", "float", "for",
      "foreach", "goto", "if", "implicit", "in", "int", "interface", "internal", "is", "lock",
      "long", "namespace", "new", "null", "object", "operator", "out", "override", "params",
      "private", "protected", "public", "readonly", "ref", "return", "sbyte", "sealed", "short",
      "sizeof", "stackalloc", "static", "string", "struct", "switch", "this", "throw", "true",
      "try", "typeof", "uint", "ulong", "unchecked", "unsafe", "ushort", "using", "virtual",
      "void", "volatile", "while"
    ]);

    const mysqlSample = String.raw`create table ` + "`work_order`" + ` (
      ` + "`id`" + ` varchar(50) not null,
      ` + "`ex_id`" + ` varchar(50) DEFAULT null COMMENT '异常id',
      ` + "`type`" + ` varchar(32) DEFAULT null COMMENT '工单类型',
      ` + "`status`" + ` varchar(32) DEFAULT null COMMENT '工单状态',
      ` + "`priority`" + ` varchar(255) DEFAULT null COMMENT '优先级',
      ` + "`distribution`" + ` varchar(32) DEFAULT null COMMENT '派发人',
      ` + "`implement`" + ` varchar(32) DEFAULT null COMMENT '执行人',
      ` + "`info`" + ` text COMMENT '备注',
      ` + "`distime`" + ` date DEFAULT null COMMENT '派发时间',
      ` + "`impltime`" + ` date DEFAULT null COMMENT '处理时间',
      ` + "`createtime`" + ` datetime DEFAULT null,
      ` + "`updatetime`" + ` datetime DEFAULT null,
      ` + "`template_id`" + ` varchar(50) DEFAULT null COMMENT '模板id',
      primary key (` + "`id`" + `)
    ) ENGINE = InnoDB DEFAULT CHARSET = utf8mb4 collate = utf8mb4_0900_ai_ci;`;

    const sqlserverSample = String.raw`create table [dbo].[sys_area] (
      [id] varchar(32) not null,
      [name] varchar(30),
      [code] varchar(15),
      [pid] varchar(32),
      [layer] int,
      [isuse] int,
      [createtime] datetime,
      [updatetime] datetime,
      [linkid] varchar(100),
      primary key ([id])
    );`;

    let currentSample = "mysql";
    let generatedCode = "";
    let parseTimer = 0;

    // ---------- SQL type → C# type mapping ----------
    const typeMap = {
      "varchar": "string",
      "char": "string",
      "nvarchar": "string",
      "nchar": "string",
      "text": "string",
      "ntext": "string",
      "longtext": "string",
      "mediumtext": "string",
      "tinytext": "string",
      "json": "string",
      "int": "int",
      "integer": "int",
      "bigint": "long",
      "smallint": "short",
      "tinyint": "byte",
      "bit": "bool",
      "decimal": "decimal",
      "numeric": "decimal",
      "money": "decimal",
      "smallmoney": "decimal",
      "float": "float",
      "real": "float",
      "double": "double",
      "date": "DateTime",
      "datetime": "DateTime",
      "datetime2": "DateTime",
      "smalldatetime": "DateTime",
      "timestamp": "DateTime",
      "time": "TimeSpan",
      "binary": "byte[]",
      "varbinary": "byte[]",
      "image": "byte[]",
      "blob": "byte[]",
      "uniqueidentifier": "Guid"
    };

    function mapSqlType(sqlType) {
      const base = sqlType.replace(/\(.*\)/, "").toLowerCase().trim();
      return typeMap[base] || "string";
    }

    // ---------- Name conversion ----------
    function toPascalCase(name) {
      if (!name) return "";
      const words = String(name).split(/[_\s]+/).filter(Boolean);
      return words.map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join("");
    }

    function escapeCsharpKeyword(name) {
      if (csharpKeywords.has(name.toLowerCase())) {
        return name + "Value";
      }
      return name;
    }

    // ---------- DDL Parsing ----------
    function parseDdl(sql) {
      const clean = sql.replace(/\/\*[\s\S]*?\*\//g, "").replace(/--.*$/gm, "").trim();
      const tables = [];
      let dbType = null;

      const createRe = /create\s+table\s+(?:if\s+not\s+exists\s+)?/gi;
      let match;

      while ((match = createRe.exec(clean)) !== null) {
        const afterCreate = clean.slice(match.index + match[0].length);
        let tableName, db, nameEnd;

        // MySQL: `table_name`
        let nameMatch = afterCreate.match(/^`(\w+)`/);
        if (nameMatch) {
          tableName = nameMatch[1];
          nameEnd = nameMatch[0].length;
          db = "MySQL";
        } else {
          // SQL Server: [schema].[table] or [table]
          nameMatch = afterCreate.match(/^\[(\w+)\]\.\[(\w+)\]/);
          if (nameMatch) {
            const schema = nameMatch[1];
            const tbl = nameMatch[2];
            tableName = schema.toLowerCase() === "dbo" ? tbl : `${schema}_${tbl}`;
            nameEnd = nameMatch[0].length;
            db = "SQL Server";
          } else {
            nameMatch = afterCreate.match(/^\[(\w+)\]/);
            if (nameMatch) {
              tableName = nameMatch[1];
              nameEnd = nameMatch[0].length;
              db = "SQL Server";
            } else {
              continue;
            }
          }
        }

        if (!dbType) dbType = db;

        const afterName = afterCreate.slice(nameEnd);
        const openIdx = afterName.indexOf("(");
        if (openIdx === -1) continue;

        // Track nesting depth to find matching closing paren
        let depth = 0;
        let closeIdx = -1;
        for (let i = openIdx; i < afterName.length; i++) {
          if (afterName[i] === "(") depth++;
          else if (afterName[i] === ")") {
            depth--;
            if (depth === 0) {
              closeIdx = i;
              break;
            }
          }
        }

        if (closeIdx === -1) continue;

        const body = afterName.slice(openIdx + 1, closeIdx);
        const columns = parseColumns(body, db);

        if (db === "SQL Server") {
          const extComments = extractSqlServerComments(clean, tableName);
          for (const col of columns) {
            const c = extComments[col.rawName.toLowerCase()];
            if (c) col.comment = c;
          }
        }

        if (columns.length > 0) {
          tables.push({
            name: toPascalCase(tableName),
            rawName: tableName,
            columns: columns,
            db: db
          });
        }
      }

      return { tables, dbType: dbType || "Unknown" };
    }

    function extractSqlServerComments(sql, tableName) {
      const comments = {};
      const re = /exec\s+sys\.sp_addextendedproperty\s+@name\s*=\s*N'MS_Description',\s*@value\s*=\s*N'([^']*)',[\s\S]*?@level2name\s*=\s*N'(\w+)'/gi;
      let m;
      while ((m = re.exec(sql)) !== null) {
        comments[m[2].toLowerCase()] = m[1];
      }
      return comments;
    }

    function parseColumns(body, dbType) {
      const columns = [];
      const lines = body.split(/,(?![^(]*\))/);

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;

        // Skip constraint lines
        const constraintKeywords = /^(primary\s+key|constraint|key\s+|index\s+|unique\s+key|unique\s+index|foreign\s+key|check\s*|primary\s+key\s*$)/i;
        if (constraintKeywords.test(trimmed)) continue;

        let colName, colType, isNullable, comment;

        if (dbType === "MySQL") {
          const parsed = parseMysqlColumn(trimmed);
          if (!parsed) continue;
          colName = parsed.name;
          colType = parsed.type;
          isNullable = parsed.nullable;
          comment = parsed.comment;
        } else {
          const parsed = parseSqlServerColumn(trimmed);
          if (!parsed) continue;
          colName = parsed.name;
          colType = parsed.type;
          isNullable = parsed.nullable;
          comment = parsed.comment;
        }

        columns.push({
          name: escapeCsharpKeyword(colName),
          rawName: colName,
          type: mapSqlType(colType),
          sqlType: colType,
          nullable: isNullable,
          comment: comment || ""
        });
      }

      return columns;
    }

    function parseMysqlColumn(line) {
      // Pattern: `col_name` type[(len)] [NOT NULL | NULL] [DEFAULT ...] [COMMENT '...']
      const re = /^`(\w+)`\s+(\w+(?:\s*\([^)]*\))?)([\s\S]*)$/i;
      const match = line.match(re);
      if (!match) return null;

      const name = match[1];
      const type = match[2].trim();
      const rest = match[3] || "";

      const notNull = /not\s+null/i.test(rest);
      const isNull = /\bnull\b/i.test(rest) && !notNull;

      let comment = "";
      const commentMatch = rest.match(/comment\s+'([^']*?)'/i);
      if (commentMatch) {
        comment = commentMatch[1];
      }

      return {
        name: name,
        type: type,
        nullable: !notNull,
        comment: comment
      };
    }

    function parseSqlServerColumn(line) {
      // Pattern: [col_name] type[(len)] [NOT NULL | NULL]
      const re = /^\[(\w+)\]\s+(\w+(?:\s*\([^)]*\))?)([\s\S]*)$/i;
      const match = line.match(re);
      if (!match) return null;

      const name = match[1];
      const type = match[2].trim();
      const rest = match[3] || "";

      const notNull = /not\s+null/i.test(rest);
      const isNull = /\bnull\b/i.test(rest) && !notNull;

      return {
        name: name,
        type: type,
        nullable: !notNull,
        comment: ""
      };
    }

    // ---------- C# Code Generation ----------
    function generateCsharp(tables, nullable) {
      return tables.map((table) => {
        const lines = [
          `    public class ${table.name}Model`,
          "    {"
        ];

        table.columns.forEach((col, idx) => {
          const csharpType = nullable ? `${col.type}?` : col.type;

          if (col.comment) {
            lines.push("        /// <summary>");
            lines.push(`        /// ${col.comment}`);
            lines.push("        /// </summary>");
          }

          if (idx === 0) {
            lines.push('        [SugarColumn(ColumnDescription = "", IsPrimaryKey = true, IsIdentity = false)]');
          }

          lines.push(`        public ${csharpType} ${col.name} { get; set; }`);
        });

        lines.push("    }");
        return lines.join("\n");
      }).join("\n\n");
    }

    // ---------- Syntax Highlighting ----------
    function highlightCsharp(code) {
      return code.split("\n").map((line) => {
        const trimmed = line.trimStart();
        const indent = line.slice(0, line.length - trimmed.length);

        if (trimmed.startsWith("///")) {
          const escapedComment = escapeHtml(trimmed);
          return indent + escapedComment
            .replace(/(&lt;\/?summary&gt;)/g, '<span class="cs-tag">$1</span>')
            .replace(/(\/\/\/)/, '<span class="cs-comment">$1</span>');
        }

        const escaped = escapeHtml(trimmed);
        const keywords = new Set(["private", "public", "class", "get", "set"]);
        const types = new Set(["string", "bool", "int", "long", "decimal", "object", "List",
          "DateTime", "TimeSpan", "Guid", "short", "byte", "float", "double"
        ]);

        const highlighted = escaped.replace(
          /\b(private|public|class|get|set|string|bool|int|long|decimal|object|List|DateTime|TimeSpan|Guid|short|byte|float|double|byte\[\]|[A-Z][A-Za-z0-9]*)(\?)?(\[\])?\b/g,
          (match, word, nullable, array, offset) => {
            const suffix = (nullable || "") + (array || "");
            if (keywords.has(word)) {
              return `<span class="cs-keyword">${word}${suffix}</span>`;
            }
            if (types.has(word)) {
              return `<span class="cs-type">${word}${suffix}</span>`;
            }
            if (escaped.slice(offset + match.length).trimStart().startsWith("{ get; set; }")) {
              return `<span class="cs-property">${word}${suffix}</span>`;
            }
            return match;
          });

        return indent + highlighted;
      }).join("\n");
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // ---------- Render ----------
    function parseAndRender() {
      const raw = input.value.trim();

      if (!raw) {
        renderEmpty();
        return;
      }

      try {
        const { tables, dbType } = parseDdl(raw);

        if (tables.length === 0) {
          generatedCode = "";
          output.classList.add("hidden");
          errorBox.classList.remove("hidden");
          errorBox.textContent = "未识别到有效的 CREATE TABLE 语句。请检查 DDL 格式。";
          setStatus("invalid", "解析失败");
          dbMetric.textContent = "数据库：--";
          tableMetric.textContent = "表：0";
          columnMetric.textContent = "字段：0";
          return;
        }

        const nullable = nullableToggle.checked;
        generatedCode = generateCsharp(tables, nullable);
        const totalColumns = tables.reduce((sum, t) => sum + t.columns.length, 0);

        output.innerHTML = highlightCsharp(generatedCode);
        output.classList.remove("placeholder", "hidden");
        errorBox.classList.add("hidden");
        setStatus("valid", `已生成 ${tables.length} 个 C# 实体类`);
        dbMetric.textContent = `数据库：${dbType}`;
        tableMetric.textContent = `表：${tables.length}`;
        columnMetric.textContent = `字段：${totalColumns}`;
      } catch (error) {
        generatedCode = "";
        output.classList.add("hidden");
        errorBox.classList.remove("hidden");
        errorBox.textContent = error.message || "解析 DDL 时发生错误";
        setStatus("invalid", "生成失败");
        dbMetric.textContent = "数据库：--";
        tableMetric.textContent = "表：0";
        columnMetric.textContent = "字段：0";
      }
    }

    function renderEmpty() {
      generatedCode = "";
      output.textContent = "生成的 C# 实体类会显示在这里。";
      output.classList.add("placeholder");
      output.classList.remove("hidden");
      errorBox.classList.add("hidden");
      setStatus("", "等待输入 DDL");
      dbMetric.textContent = "数据库：--";
      tableMetric.textContent = "表：0";
      columnMetric.textContent = "字段：0";
    }

    function setStatus(state, message) {
      statusStrip.classList.remove("valid", "invalid");
      if (state) {
        statusStrip.classList.add(state);
      }
      statusText.textContent = message;
    }

    function updateInputLineNumbers() {
      const lines = Math.max(1, countLines(input.value));
      inputLines.textContent = Array.from({ length: lines }, (_, index) => index + 1).join("\n");
      inputLines.scrollTop = input.scrollTop;
    }

    function countLines(text) {
      return text ? text.split(/\r\n|\r|\n/).length : 0;
    }

    // ---------- Event Listeners ----------
    input.addEventListener("input", () => {
      updateInputLineNumbers();
      window.clearTimeout(parseTimer);
      parseTimer = window.setTimeout(parseAndRender, 120);
    });

    input.addEventListener("scroll", () => {
      inputLines.scrollTop = input.scrollTop;
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Tab") {
        event.preventDefault();
        const start = input.selectionStart;
        const end = input.selectionEnd;
        input.setRangeText("  ", start, end, "end");
        updateInputLineNumbers();
        parseAndRender();
      }
    });

    nullableToggle.addEventListener("change", parseAndRender);

    sampleBtn.addEventListener("click", () => {
      currentSample = currentSample === "mysql" ? "sqlserver" : "mysql";
      input.value = currentSample === "mysql" ? mysqlSample : sqlserverSample;
      input.focus();
      updateInputLineNumbers();
      parseAndRender();
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      input.focus();
      updateInputLineNumbers();
      renderEmpty();
    });

    pasteBtn.addEventListener("click", async () => {
      if (!navigator.clipboard?.readText) {
        setStatus("invalid", "当前浏览器不支持直接读取剪贴板");
        return;
      }

      try {
        input.value = await navigator.clipboard.readText();
        input.focus();
        updateInputLineNumbers();
        parseAndRender();
      } catch {
        setStatus("invalid", "浏览器没有授权读取剪贴板");
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!generatedCode) {
        setStatus("invalid", "没有可复制的 C# 实体");
        return;
      }

      try {
        await navigator.clipboard.writeText(generatedCode);
        setStatus("valid", "已复制 C# 实体");
      } catch {
        setStatus("invalid", "复制失败，请手动选择结果复制");
      }
    });

    copyOutputBtn.addEventListener("click", async () => {
      if (!generatedCode) {
        setStatus("invalid", "没有可复制的结果");
        return;
      }

      try {
        await navigator.clipboard.writeText(generatedCode);
        setStatus("valid", "已复制 C# 实体");
      } catch {
        setStatus("invalid", "复制失败，请手动选择结果复制");
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!generatedCode) {
        setStatus("invalid", "没有可下载的 C# 实体");
        return;
      }

      const blob = new Blob([generatedCode], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "EntityClasses.cs";
      link.click();
      URL.revokeObjectURL(url);
    });

    updateInputLineNumbers();
    renderEmpty();
  </script>
</body>

</html>
